{% extends "base.html" %}

{% block title %}Activity Logs - BP Badminton{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto" x-data="activityLogs()">
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 gradient-primary rounded-2xl shadow-lg mb-4 border-2 border-wimbledon-gold">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path>
            </svg>
        </div>
        <h1 class="text-2xl sm:text-3xl font-serif font-bold text-wimbledon-purple">Activity Logs</h1>
        <p class="text-gray-500 mt-1">
            <span x-text="filteredLogs.length"></span> of {{ logs.total }} entries
            <span x-show="hasActiveFilter" class="text-wimbledon-green font-medium">(filtered)</span>
        </p>
    </div>

    <!-- Filters & Delete -->
    <div class="bg-white rounded-2xl shadow-lg p-5 border border-wimbledon-gold/20 mb-6">
        <div class="flex flex-col gap-4">
            <!-- Row 1: Search, Action, Clear -->
            <div class="flex flex-col md:flex-row gap-3 items-end">
                <div class="flex-1">
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Search (User / Description)</label>
                    <input type="text" x-model="search" placeholder="Type to filter..."
                        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-wimbledon-green">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Action</label>
                    <select x-model="actionFilter" class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-wimbledon-green bg-white">
                        <option value="">All Actions</option>
                        {% for a in actions %}
                        <option value="{{ a }}">{{ a }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">Start Date</label>
                    <input type="date" x-model="startDate"
                        class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-wimbledon-green">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">End Date</label>
                    <input type="date" x-model="endDate"
                        class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-wimbledon-green">
                </div>
                <div class="flex items-end gap-2">
                    <button @click="clearFilters()" x-show="hasActiveFilter"
                        class="px-4 py-2 border border-gray-300 text-gray-600 rounded-lg text-sm hover:bg-gray-50 transition-all">
                        Clear
                    </button>
                </div>
            </div>

            <!-- Row 2: Delete (right-aligned) -->
            <div class="flex justify-end border-t border-gray-100 pt-4">
                <form method="POST" action="{{ url_for('delete_activity_logs') }}" onsubmit="return confirm('Delete all logs before this date? This cannot be undone.')" class="flex gap-2 items-end">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Delete logs before</label>
                        <input type="date" name="before_date" required
                            class="px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-red-400">
                    </div>
                    <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg text-sm font-medium hover:bg-red-700 transition-all">
                        Delete
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Logs Table -->
    <div class="bg-white rounded-2xl shadow-lg border border-wimbledon-gold/20 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="min-w-full">
                <thead>
                    <tr class="bg-wimbledon-cream/50 text-left">
                        <th class="px-4 py-3 text-xs font-bold text-wimbledon-purple uppercase tracking-wider cursor-pointer select-none hover:bg-wimbledon-cream/80 transition-colors"
                            @click="toggleSort('date_sort')">
                            <span class="flex items-center gap-1">
                                Timestamp
                                <template x-if="sortCol === 'date_sort'">
                                    <svg class="w-3 h-3" :class="sortDir === 'asc' ? '' : 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                </template>
                                <template x-if="sortCol !== 'date_sort'">
                                    <svg class="w-3 h-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                </template>
                            </span>
                        </th>
                        <th class="px-4 py-3 text-xs font-bold text-wimbledon-purple uppercase tracking-wider cursor-pointer select-none hover:bg-wimbledon-cream/80 transition-colors"
                            @click="toggleSort('user_name')">
                            <span class="flex items-center gap-1">
                                User
                                <template x-if="sortCol === 'user_name'">
                                    <svg class="w-3 h-3" :class="sortDir === 'asc' ? '' : 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                </template>
                                <template x-if="sortCol !== 'user_name'">
                                    <svg class="w-3 h-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                </template>
                            </span>
                        </th>
                        <th class="px-4 py-3 text-xs font-bold text-wimbledon-purple uppercase tracking-wider cursor-pointer select-none hover:bg-wimbledon-cream/80 transition-colors"
                            @click="toggleSort('action')">
                            <span class="flex items-center gap-1">
                                Action
                                <template x-if="sortCol === 'action'">
                                    <svg class="w-3 h-3" :class="sortDir === 'asc' ? '' : 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                </template>
                                <template x-if="sortCol !== 'action'">
                                    <svg class="w-3 h-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                </template>
                            </span>
                        </th>
                        <th class="px-4 py-3 text-xs font-bold text-wimbledon-purple uppercase tracking-wider cursor-pointer select-none hover:bg-wimbledon-cream/80 transition-colors"
                            @click="toggleSort('description')">
                            <span class="flex items-center gap-1">
                                Description
                                <template x-if="sortCol === 'description'">
                                    <svg class="w-3 h-3" :class="sortDir === 'asc' ? '' : 'rotate-180'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
                                </template>
                                <template x-if="sortCol !== 'description'">
                                    <svg class="w-3 h-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>
                                </template>
                            </span>
                        </th>
                        <th class="px-4 py-3 text-xs font-bold text-wimbledon-purple uppercase tracking-wider hidden sm:table-cell">IP</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="log in paginatedLogs" :key="log.id">
                        <tr class="border-t border-gray-100 hover:bg-wimbledon-cream/30 transition-colors">
                            <td class="px-2 sm:px-4 py-3 whitespace-nowrap text-xs sm:text-sm text-gray-600" x-text="log.timestamp + ' ET'"></td>
                            <td class="px-2 sm:px-4 py-3 whitespace-nowrap">
                                <div class="flex items-center gap-2">
                                    <span class="text-sm font-medium text-gray-800" x-text="log.user_name"></span>
                                    <span class="text-[10px] px-1.5 py-0.5 rounded-full font-medium"
                                        :class="log.user_type === 'admin' ? 'bg-purple-100 text-purple-700' : log.user_type === 'player_admin' ? 'bg-blue-100 text-blue-700' : 'bg-gray-100 text-gray-600'"
                                        x-text="log.user_type"></span>
                                </div>
                            </td>
                            <td class="px-4 py-3 whitespace-nowrap">
                                <span class="text-xs px-2 py-1 rounded-full font-medium bg-wimbledon-green/10 text-wimbledon-green" x-text="log.action"></span>
                            </td>
                            <td class="px-2 sm:px-4 py-3 text-xs sm:text-sm text-gray-700 max-w-[150px] sm:max-w-md truncate" x-text="log.description"></td>
                            <td class="px-2 sm:px-4 py-3 whitespace-nowrap text-xs text-gray-400 font-mono hidden sm:table-cell" x-text="log.ip || '\u2014'"></td>
                        </tr>
                    </template>
                    <tr x-show="filteredLogs.length === 0">
                        <td colspan="5" class="px-4 py-12 text-center text-gray-400">No activity logs found.</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="px-3 sm:px-6 py-4 border-t border-gray-100 flex flex-col sm:flex-row items-center justify-between gap-3" x-show="totalPages > 1">
            <div class="text-sm text-gray-500">
                Page <span x-text="currentPage"></span> of <span x-text="totalPages"></span>
                (<span x-text="filteredLogs.length"></span> entries)
            </div>
            <div class="flex gap-1">
                <button @click="currentPage--" :disabled="currentPage <= 1"
                    class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg hover:bg-wimbledon-cream transition-all disabled:opacity-40 disabled:cursor-not-allowed">Prev</button>
                <template x-for="(p, idx) in visiblePages" :key="'pg-'+idx">
                    <button x-show="p > 0" @click="currentPage = p"
                        class="px-3 py-1.5 text-sm border rounded-lg transition-all"
                        :class="p === currentPage ? 'bg-wimbledon-purple text-white border-wimbledon-purple' : 'border-gray-200 hover:bg-wimbledon-cream'"
                        x-text="p"></button>
                    <span x-show="p === 0" class="px-2 py-1.5 text-gray-400">...</span>
                </template>
                <button @click="currentPage++" :disabled="currentPage >= totalPages"
                    class="px-3 py-1.5 text-sm border border-gray-200 rounded-lg hover:bg-wimbledon-cream transition-all disabled:opacity-40 disabled:cursor-not-allowed">Next</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function activityLogs() {
    return {
        search: '',
        actionFilter: '',
        startDate: '',
        endDate: '',
        sortCol: 'date_sort',
        sortDir: 'desc',
        currentPage: 1,
        perPage: 50,
        allLogs: {{ logs_json | safe }},

        get hasActiveFilter() {
            return this.search || this.actionFilter || this.startDate || this.endDate;
        },

        get filteredLogs() {
            let result = this.allLogs;

            if (this.actionFilter) {
                result = result.filter(l => l.action === this.actionFilter);
            }
            if (this.search) {
                const q = this.search.toLowerCase();
                result = result.filter(l =>
                    l.user_name.toLowerCase().includes(q) ||
                    l.description.toLowerCase().includes(q)
                );
            }
            if (this.startDate) {
                result = result.filter(l => l.date_iso >= this.startDate);
            }
            if (this.endDate) {
                result = result.filter(l => l.date_iso <= this.endDate);
            }

            // Sort
            const col = this.sortCol;
            const dir = this.sortDir === 'asc' ? 1 : -1;
            result = [...result].sort((a, b) => {
                const aVal = (a[col] || '').toLowerCase();
                const bVal = (b[col] || '').toLowerCase();
                if (aVal < bVal) return -1 * dir;
                if (aVal > bVal) return 1 * dir;
                return 0;
            });

            return result;
        },

        get totalPages() {
            return Math.max(1, Math.ceil(this.filteredLogs.length / this.perPage));
        },

        get paginatedLogs() {
            const start = (this.currentPage - 1) * this.perPage;
            return this.filteredLogs.slice(start, start + this.perPage);
        },

        get visiblePages() {
            const pages = [];
            const total = this.totalPages;
            const cur = this.currentPage;
            if (total <= 7) {
                for (let i = 1; i <= total; i++) pages.push(i);
            } else {
                pages.push(1);
                if (cur > 3) pages.push(0);
                for (let i = Math.max(2, cur - 1); i <= Math.min(total - 1, cur + 1); i++) {
                    pages.push(i);
                }
                if (cur < total - 2) pages.push(0);
                pages.push(total);
            }
            return pages;
        },

        toggleSort(col) {
            if (this.sortCol === col) {
                this.sortDir = this.sortDir === 'asc' ? 'desc' : 'asc';
            } else {
                this.sortCol = col;
                this.sortDir = col === 'date_sort' ? 'desc' : 'asc';
            }
            this.currentPage = 1;
        },

        clearFilters() {
            this.search = '';
            this.actionFilter = '';
            this.startDate = '';
            this.endDate = '';
            this.currentPage = 1;
        },

        init() {
            this.$watch('search', () => this.currentPage = 1);
            this.$watch('actionFilter', () => this.currentPage = 1);
            this.$watch('startDate', () => this.currentPage = 1);
            this.$watch('endDate', () => this.currentPage = 1);
        }
    };
}
</script>
{% endblock %}
