app = "bp-badminton"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.fly"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "bpbadi_data"
  destination = "/app/instance"
